<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title></title>
  <style>
    :root {
      --color: #57f287;
      --glow:  rgba(87,242,135,.4);
      --accent: #e05a28;     /* override par thème user */
      --scale: 1;            /* taille de l'overlay (0.5 - 1.5) */
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: transparent;
      pointer-events: none;
    }

    #stage {
      position: fixed; inset: 0;
      display: flex;
      padding: 50px 40px;
      opacity: 0;
      transition: opacity 0.25s ease;
    }
    #stage.visible { opacity: 1; }

    #stage.top-left     { align-items: flex-start; justify-content: flex-start; }
    #stage.top          { align-items: flex-start; justify-content: center; }
    #stage.top-right    { align-items: flex-start; justify-content: flex-end; }
    #stage.center       { align-items: center;     justify-content: center; }
    #stage.bottom-left  { align-items: flex-end;   justify-content: flex-start; }
    #stage.bottom-right { align-items: flex-end;   justify-content: flex-end; }

    #card-wrapper {
      position: relative;
      max-width: 440px;
      width: 100%;
      padding-top: 30px;
      transform: scale(var(--scale));
      transform-origin: top center;
    }

    /* Animations sélectionnables */
    body.anim-pop   #card-wrapper { animation: pop-in   .35s cubic-bezier(.16,1,.3,1) both; }
    body.anim-slide #card-wrapper { animation: slide-in .4s  cubic-bezier(.16,1,.3,1) both; }
    body.anim-fade  #card-wrapper { animation: fade-in  .4s  ease both; }
    body.anim-bounce #card-wrapper { animation: bounce-in .55s cubic-bezier(.34,1.6,.64,1) both; }
    body.anim-none  #card-wrapper { animation: none; }

    @keyframes pop-in    { from{transform:translateY(18px) scale(.92);opacity:0} to{opacity:1} }
    @keyframes slide-in  { from{transform:translateX(40px);opacity:0} to{opacity:1} }
    @keyframes fade-in   { from{opacity:0} to{opacity:1} }
    @keyframes bounce-in { 0%{transform:translateY(40px) scale(.7);opacity:0} 60%{transform:translateY(-6px) scale(1.05)} 100%{transform:translateY(0) scale(1);opacity:1} }

    #card-author {
      position: absolute;
      top: 0; left: 10px;
      display: flex; align-items: center; gap: 12px;
      z-index: 20;
    }

    #avatar {
      width: 60px; height: 60px;
      border-radius: 50%;
      background: #555;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 900; color: #fff;
      flex-shrink: 0; text-transform: uppercase;
      border: 3px solid var(--color);
      box-shadow: 0 0 0 2px rgba(0,0,0,.55), 0 0 18px var(--glow);
      overflow: hidden;
    }

    .author-text { display: flex; flex-direction: column; line-height: 1.2; }

    #author-name {
      font-family: 'Segoe UI Black', 'Arial Black', Impact, sans-serif;
      font-size: 19px; font-weight: 900; color: #fff;
      -webkit-text-stroke: 3px #000;
      paint-order: stroke fill;
      text-shadow: 0 2px 10px rgba(0,0,0,.9);
    }

    #platform-badge {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 10px; font-weight: 700;
      color: rgba(255,255,255,.5);
      text-transform: uppercase; letter-spacing: .08em;
      -webkit-text-stroke: 0;
    }

    #card {
      position: relative;
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      border: 2.5px solid var(--color);
      box-shadow:
        0 0 0 1px rgba(0,0,0,.5),
        0 0 26px var(--glow),
        0 14px 50px rgba(0,0,0,.85);
      background: #111;
      pointer-events: all;
    }

    #media-wrap {
      width: 100%; max-height: 520px;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    #media-wrap img,
    #media-wrap video {
      max-width: 100%; max-height: 520px;
      display: block; object-fit: contain;
    }

    /* Mode streamer : floute les médias (audio garde le son) */
    body.streamer #media-wrap img,
    body.streamer #media-wrap video { filter: blur(28px); }

    /* Streamer : floute les avatars */
    body.streamer-avatars #avatar img { filter: blur(10px); }
    body.streamer-avatars #avatar { color: transparent; }

    /* Streamer : cache les pseudos (le JS remplace par "Anonyme") */
    body.streamer-names #author-name { letter-spacing: 0.05em; }

    #msg-text {
      position: absolute;
      bottom: 3px; left: 0; right: 0;
      padding: 32px 16px 10px;
      background: linear-gradient(transparent, rgba(0,0,0,.82));
      text-align: center;
      font-family: 'Segoe UI Black', 'Arial Black', Impact, sans-serif;
      font-size: 20px; font-weight: 900; color: #fff;
      -webkit-text-stroke: 2px #000;
      paint-order: stroke fill;
      text-shadow: 0 2px 10px rgba(0,0,0,.9);
      white-space: pre-wrap; word-break: break-word;
      transition: bottom 0.2s ease;
      pointer-events: none;
    }
    #msg-text:empty { display: none; }
    #card:hover #msg-text:not(:empty) { bottom: 70px; }

    /* ── Bottom bar unifiée (réactions + contrôles) ── */
    #bottom-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      display: none;
      flex-direction: column;
      background: linear-gradient(to bottom, rgba(0,0,0,.45) 0%, rgba(0,0,0,.92) 35%);
      backdrop-filter: blur(8px);
      transform: translateY(8px);
      opacity: 0;
      transition: transform .2s ease, opacity .2s ease;
    }
    #card:hover #bottom-bar {
      display: flex;
      transform: translateY(0);
      opacity: 1;
    }

    #reactions-row {
      display: flex; align-items: center; justify-content: center;
      gap: 10px;
      padding: 10px 12px 8px;
    }

    .reaction-btn {
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 999px;
      width: 38px; height: 38px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 20px;
      cursor: pointer; flex-shrink: 0;
      transition: transform .12s ease, background .12s ease, border-color .12s ease;
      line-height: 1;
      box-shadow: 0 2px 6px rgba(0,0,0,.4);
    }
    .reaction-btn:hover { background: rgba(255,255,255,.22); transform: scale(1.15) translateY(-2px); border-color: rgba(255,255,255,.35); }
    .reaction-btn:active { transform: scale(0.95); }
    .reaction-btn.used {
      background: rgba(237,66,69,.28); border-color: rgba(237,66,69,.7);
      box-shadow: 0 0 14px rgba(237,66,69,.5);
    }
    .reaction-btn:disabled { opacity: .5; cursor: default; }

    /* ── Contrôles bas (pause / volume / discord / skip) ── */
    #media-controls {
      display: flex; align-items: center; gap: 10px;
      padding: 6px 12px 8px;
      border-top: 1px solid rgba(255,255,255,.08);
    }

    .ctrl-btn {
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 6px; color: #fff;
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: background .15s, color .15s, border-color .15s;
    }
    .ctrl-btn:hover { background: rgba(255,255,255,.25); }
    .ctrl-btn:disabled { opacity: .4; cursor: default; }

    #vol-ctrl {
      flex: 1;
      -webkit-appearance: none; appearance: none;
      height: 3px; background: rgba(255,255,255,.25);
      border-radius: 2px; cursor: pointer; outline: none;
    }
    #vol-ctrl::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 13px; height: 13px; border-radius: 50%;
      background: var(--color); cursor: pointer;
    }

    #progress {
      height: 3px;
      background: linear-gradient(90deg, var(--color), rgba(255,255,255,.25));
      transform-origin: left center;
      transform: scaleX(0);
    }

    #queue-badge {
      display: none;
      text-align: center; padding: 4px 14px;
      font-size: 11px; font-weight: 600;
      color: rgba(255,255,255,.4);
      background: rgba(0,0,0,.6);
      letter-spacing: .06em;
    }

    #snooze-badge {
      position: fixed;
      top: 12px; right: 12px;
      background: rgba(0,0,0,.75);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 8px;
      padding: 6px 12px;
      color: #faa61a;
      font-size: 12px; font-weight: 700;
      display: none;
      pointer-events: none;
    }
    #snooze-badge.visible { display: block; }
  </style>
</head>
<body class="anim-pop">
  <div id="snooze-badge">🔕 Snooze actif</div>

  <div id="stage" class="top">
    <div id="card-wrapper">

      <div id="card-author">
        <div id="avatar">?</div>
        <div class="author-text">
          <span id="author-name">Utilisateur</span>
          <span id="platform-badge">Discord</span>
        </div>
      </div>

      <div id="card">
        <div id="media-wrap"></div>
        <div id="msg-text"></div>

        <div id="bottom-bar">
          <div id="reactions-row" id="reactions-bar">
            <button class="reaction-btn" data-emoji="❤️" title="J'aime (réaction bot)">❤️</button>
            <button class="reaction-btn" data-emoji="😂" title="Drôle (réaction bot)">😂</button>
            <button class="reaction-btn" data-emoji="🔥" title="Au feu (réaction bot)">🔥</button>
            <button class="reaction-btn" data-emoji="💀" title="Mort de rire (réaction bot)">💀</button>
            <button class="reaction-btn" data-emoji="👀" title="Intéressant (réaction bot)">👀</button>
          </div>

          <div id="media-controls">
            <button class="ctrl-btn" id="btn-pause" title="Pause / Lecture">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
            </button>
            <input type="range" id="vol-ctrl" min="0" max="1" step="0.05" value="0.5" />
            <button class="ctrl-btn" id="btn-discord" title="Ouvrir dans Discord (pour réagir avec ton compte)" style="display:none">
              <svg width="14" height="14" viewBox="0 -28.5 256 256" fill="currentColor"><path d="M216.856 16.597A208.502 208.502 0 0 0 164.042 0c-2.275 4.113-4.933 9.645-6.766 14.046-19.692-2.961-39.203-2.961-58.533 0-1.832-4.4-4.55-9.933-6.846-14.046a207.809 207.809 0 0 0-52.855 16.638C5.618 67.147-3.443 116.4 1.087 164.956c22.169 16.555 43.653 26.612 64.775 33.193A161.094 161.094 0 0 0 79.735 175.3a136.413 136.413 0 0 1-21.846-10.632 108.636 108.636 0 0 0 5.356-4.237c42.122 19.702 87.89 19.702 129.51 0a131.66 131.66 0 0 0 5.355 4.237 136.07 136.07 0 0 1-21.886 10.653c4.006 8.02 8.638 15.67 13.873 22.848 21.142-6.58 42.646-16.637 64.815-33.213 5.316-56.288-9.08-105.09-38.056-148.36ZM85.474 135.095c-12.645 0-23.015-11.805-23.015-26.18s10.149-26.2 23.015-26.2c12.867 0 23.236 11.804 23.015 26.2.02 14.375-10.148 26.18-23.015 26.18Zm85.051 0c-12.645 0-23.014-11.805-23.014-26.18s10.148-26.2 23.014-26.2c12.867 0 23.236 11.804 23.015 26.2 0 14.375-10.148 26.18-23.015 26.18Z"/></svg>
            </button>
            <button class="ctrl-btn" id="btn-skip" title="Passer">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
          </div>
        </div>
        <div id="progress"></div>
        <div id="queue-badge"></div>
      </div>

    </div>
  </div>
  <script src="overlay.js"></script>
</body>
</html>
