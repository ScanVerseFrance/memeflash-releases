<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title></title>
  <style>
    :root {
      --color: #57f287;
      --glow:  rgba(87,242,135,.4);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: transparent;
      pointer-events: none;
    }

    #stage {
      position: fixed; inset: 0;
      display: flex;
      padding: 50px 40px;
      opacity: 0;
      transition: opacity 0.25s ease;
    }
    #stage.visible { opacity: 1; }

    #stage.top-left     { align-items: flex-start; justify-content: flex-start; }
    #stage.top          { align-items: flex-start; justify-content: center; }
    #stage.top-right    { align-items: flex-start; justify-content: flex-end; }
    #stage.center       { align-items: center;     justify-content: center; }
    #stage.bottom-left  { align-items: flex-end;   justify-content: flex-start; }
    #stage.bottom-right { align-items: flex-end;   justify-content: flex-end; }

    /* ── Wrapper : card + auteur flottant ── */
    #card-wrapper {
      position: relative;
      max-width: 440px;
      width: 100%;
      padding-top: 30px;
      animation: pop-in .35s cubic-bezier(.16,1,.3,1) both;
    }

    @keyframes pop-in {
      from { transform: translateY(18px) scale(.92); opacity: 0; }
      to   { transform: none; opacity: 1; }
    }

    /* ── Auteur flottant (avatar à cheval sur le bord de la carte) ── */
    #card-author {
      position: absolute;
      top: 0; left: 10px;
      display: flex; align-items: center; gap: 12px;
      z-index: 20;
    }

    #avatar {
      width: 60px; height: 60px;
      border-radius: 50%;
      background: #555;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 900; color: #fff;
      flex-shrink: 0; text-transform: uppercase;
      border: 3px solid var(--color);
      box-shadow: 0 0 0 2px rgba(0,0,0,.55), 0 0 18px var(--glow);
      overflow: hidden;
    }

    .author-text { display: flex; flex-direction: column; line-height: 1.2; }

    #author-name {
      font-family: 'Segoe UI Black', 'Arial Black', Impact, sans-serif;
      font-size: 19px; font-weight: 900; color: #fff;
      -webkit-text-stroke: 3px #000;
      paint-order: stroke fill;
      text-shadow: 0 2px 10px rgba(0,0,0,.9);
    }

    #platform-badge {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 10px; font-weight: 700;
      color: rgba(255,255,255,.5);
      text-transform: uppercase; letter-spacing: .08em;
      -webkit-text-stroke: 0;
    }

    /* ── Carte ── */
    #card {
      position: relative;
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      border: 2.5px solid var(--color);
      box-shadow:
        0 0 0 1px rgba(0,0,0,.5),
        0 0 26px var(--glow),
        0 14px 50px rgba(0,0,0,.85);
      background: #111;
      pointer-events: all;
    }

    /* ── Média ── */
    #media-wrap {
      width: 100%; max-height: 520px;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    #media-wrap img,
    #media-wrap video {
      max-width: 100%; max-height: 520px;
      display: block; object-fit: contain;
    }

    /* ── Texte overlayé sur l'image (outlined, style LiveChat) ── */
    #msg-text {
      position: absolute;
      bottom: 3px; left: 0; right: 0;
      padding: 32px 16px 10px;
      background: linear-gradient(transparent, rgba(0,0,0,.82));
      text-align: center;
      font-family: 'Segoe UI Black', 'Arial Black', Impact, sans-serif;
      font-size: 20px; font-weight: 900; color: #fff;
      -webkit-text-stroke: 2px #000;
      paint-order: stroke fill;
      text-shadow: 0 2px 10px rgba(0,0,0,.9);
      white-space: pre-wrap; word-break: break-word;
      transition: bottom 0.2s ease;
      pointer-events: none;
    }
    #msg-text:empty { display: none; }
    #card:hover #msg-text:not(:empty) { bottom: 46px; }

    /* ── Contrôles hover ── */
    #media-controls {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      display: none;
      align-items: center; gap: 10px;
      padding: 8px 12px;
      background: rgba(0,0,0,.88);
      backdrop-filter: blur(6px);
    }
    #card:hover #media-controls { display: flex; }

    .ctrl-btn {
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 6px; color: #fff;
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: background .15s, color .15s, border-color .15s;
    }
    .ctrl-btn:hover { background: rgba(255,255,255,.25); }
    .ctrl-btn.liked {
      color: #ed4245; border-color: rgba(237,66,69,.6);
      background: rgba(237,66,69,.15);
    }
    .ctrl-btn:disabled { opacity: .4; cursor: default; }

    #vol-ctrl {
      flex: 1;
      -webkit-appearance: none; appearance: none;
      height: 3px; background: rgba(255,255,255,.25);
      border-radius: 2px; cursor: pointer; outline: none;
    }
    #vol-ctrl::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 13px; height: 13px; border-radius: 50%;
      background: var(--color); cursor: pointer;
    }

    /* ── Progression ── */
    #progress {
      height: 3px;
      background: linear-gradient(90deg, var(--color), rgba(255,255,255,.25));
      transform-origin: left center;
      transform: scaleX(0);
    }

    /* ── Queue badge ── */
    #queue-badge {
      display: none;
      text-align: center; padding: 4px 14px;
      font-size: 11px; font-weight: 600;
      color: rgba(255,255,255,.4);
      background: rgba(0,0,0,.6);
      letter-spacing: .06em;
    }
  </style>
</head>
<body>
  <div id="stage" class="top">
    <div id="card-wrapper">

      <div id="card-author">
        <div id="avatar">?</div>
        <div class="author-text">
          <span id="author-name">Utilisateur</span>
          <span id="platform-badge">Discord</span>
        </div>
      </div>

      <div id="card">
        <div id="media-wrap"></div>
        <div id="msg-text"></div>
        <div id="media-controls">
          <button class="ctrl-btn" id="btn-pause">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
          </button>
          <input type="range" id="vol-ctrl" min="0" max="1" step="0.05" value="0.5" />
          <button class="ctrl-btn" id="btn-like" title="J'aime (réaction Discord)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7-4.5-9.5-9A5.5 5.5 0 0 1 12 6.5 5.5 5.5 0 0 1 21.5 12c-2.5 4.5-9.5 9-9.5 9z"/></svg>
          </button>
          <button class="ctrl-btn" id="btn-skip">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>
        </div>
        <div id="progress"></div>
        <div id="queue-badge"></div>
      </div>

    </div>
  </div>
  <script src="overlay.js"></script>
</body>
</html>
